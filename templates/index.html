<script>
        async function validar() {
            const btn = document.getElementById('btn');
            const resDiv = document.getElementById('resultado');
            const codigo = document.getElementById('codigo').value;
            
            btn.innerText = "Validando...";
            const res = await fetch('/validar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({codigo: codigo})
            });
            const data = await res.json();
            
            if (res.ok) {
                resDiv.innerText = "¡Acceso concedido! Redirigiendo...";
                resDiv.className = 'exito';
                // Redirección a la página de contenido
                window.location.href = "/contenido"; 
            } else {
                resDiv.innerText = data.mensaje;
                resDiv.className = 'error';
                btn.innerText = "Validar Acceso";
            }
        }
    </script>
